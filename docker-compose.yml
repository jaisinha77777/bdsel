services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"     # in-network listener (advertised as kafka:9092)
      - "29092:29092"   # host listener (advertised as localhost:29092)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual listeners: in-network clients (api/producer) reach kafka:9092;
      # host tools reach localhost:29092. The old single localhost:9092
      # advertised listener was unreachable from other containers.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 4   # new topics start with 4 partitions to balance

  spark:
    image: apache/spark:latest
    container_name: spark
    depends_on:
      - kafka
    ports:
      - "4040:4040"

  api:
    build: .
    container_name: sedp-api
    command: uvicorn src.sedp.api:app --host 0.0.0.0 --port 8000
    environment:
      # active prediction algorithm: ewma_trend | holt | ar | kalman | linreg
      SEDP_PREDICTOR: ${SEDP_PREDICTOR:-ewma_trend}
      # in-network Kafka bootstrap; when set, the API runs a live consumer
      # thread that feeds the engine from the topic (not just HTTP /ingest).
      SEDP_KAFKA: kafka:9092
      # hard cap on Kafka partitions to stop runaway splitting
      SEDP_MAX_PARTITIONS: "16"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - kafka

  streamlit:
    build: .
    container_name: sedp-dashboard
    working_dir: /app
    volumes:
      - ./:/app
    command: streamlit run src/sedp/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api

  producer:
    build: .
    container_name: sedp-producer
    working_dir: /app
    volumes:
      - ./:/app
    # streams skewed synthetic traffic into the Kafka topic continuously
    command: python -m src.sedp.producer
    environment:
      SEDP_KAFKA: kafka:9092
      SEDP_RPS: "500"
    depends_on:
      - kafka
      - api

  eval-dashboard:
    build: .
    container_name: sedp-eval
    working_dir: /app
    volumes:
      - ./:/app
    command: streamlit run src/sedp/eval_dashboard.py --server.port 8502 --server.address 0.0.0.0
    ports:
      - "8502:8502"
    depends_on:
      - api
