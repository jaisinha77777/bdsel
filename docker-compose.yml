services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  spark:
    image: apache/spark:latest
    container_name: spark
    depends_on:
      - kafka
    ports:
      - "4040:4040"

  api:
    build: .
    container_name: sedp-api
    command: uvicorn src.sedp.api:app --host 0.0.0.0 --port 8000 
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - kafka

  streamlit:
    build: .
    container_name: sedp-dashboard
    working_dir: /app
    volumes:
      - ./:/app
    command: streamlit run src/sedp/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
